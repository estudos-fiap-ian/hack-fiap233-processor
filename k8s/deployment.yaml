apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor-deployment
  labels:
    app: processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: ECR_PROCESSOR_URL:latest
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: SQS_QUEUE_URL
              value: "SQS_QUEUE_URL_PLACEHOLDER"
            - name: S3_BUCKET
              value: "S3_BUCKET_PLACEHOLDER"
            - name: SMTP_FROM
              value: "SMTP_FROM_PLACEHOLDER"
            - name: SMTP_PASSWORD
              value: "SMTP_PASSWORD_PLACEHOLDER"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: videos-db-credentials
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: videos-db-credentials
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: videos-db-credentials
                  key: dbname
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: videos-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: videos-db-credentials
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
